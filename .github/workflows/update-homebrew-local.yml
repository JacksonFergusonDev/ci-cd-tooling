name: Update Homebrew Tap (Local Manifest)

on:
  workflow_call:
    inputs:
      tag:
        description: 'The release tag (e.g., v1.0.0)'
        required: true
        type: string
      formula_path:
        description: 'Relative path to the formula in the tap (e.g., Formula/focal.rb)'
        required: true
        type: string
    secrets:
      TAP_GITHUB_TOKEN:
        required: true

jobs:
  sync-homebrew:
    name: Sync Formula & Python Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Check out Caller Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: caller-repo

      - name: Check out Homebrew Tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: JacksonFergusonDev/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Check out Tooling Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: JacksonFergusonDev/ci-cd-tooling
          path: tooling-repo

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Tap the repository
        run: brew tap JacksonFergusonDev/homebrew-tap ./homebrew-tap

      - name: Update Formula
        run: |
          uv run tooling-repo/scripts/update_homebrew_local.py \
            --repo "${{ github.repository }}" \
            --tag "${{ inputs.tag }}" \
            --formula "homebrew-tap/${{ inputs.formula_path }}" \
            --caller-dir "caller-repo"

      - name: Commit and Push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.formula_path }}"

          if git diff --cached --quiet; then
            echo "No formula changes to commit."
            exit 0
          fi

          # Dynamically extract package name from formula path
          FORMULA_FILENAME=$(basename "${{ inputs.formula_path }}")
          PACKAGE_NAME="${FORMULA_FILENAME%.*}"

          cp "${{ inputs.formula_path }}" "$(brew --repository jacksonfergusondev/homebrew-tap)/Formula/"

          brew audit --strict --online "jacksonfergusondev/homebrew-tap/$PACKAGE_NAME"
          git commit -m "chore: bump $PACKAGE_NAME to ${{ inputs.tag }} and sync python resources"
          git push
